<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>关卡DEMO制作｜李振东作品集</title>
    <link rel="stylesheet" href="./showcase.css" />
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <a class="brand" href="/">LZD PORTFOLIO</a>
        <a class="back" href="/#projects">返回精选项目</a>
      </header>

      <section class="hero">
        <div>
          <p class="kicker">Dungeon Flow / Level Demo</p>
          <h1>关卡DEMO制作</h1>
        </div>
        <p class="intro">
          用于展示关卡灰盒、战斗入口、遭遇区、补给点、Boss 场与动线规划。后续可直接替换为 mp4、jpg、png 等素材，HR 打开网页即可浏览。
        </p>
      </section>

      <section class="media-grid">
        <article class="media-card">
          <div class="media-frame">
            <video src="./media/level-demo-01.mp4" controls playsinline preload="metadata"></video>
          </div>
          <div class="caption">
            <h2>场景资产呈现</h2>
            <p>展示场景资产、地表植被、岩石与环境氛围的搭建效果，体现地编与建模资产落地能力。</p>
          </div>
        </article>

        <article class="media-card">
          <div class="media-frame">
            <img src="./media/level-demo-assets.jpg" alt="关卡 DEMO 场景资产合集图" />
          </div>
          <div class="caption">
            <h2>场景资产合集</h2>
            <p>展示关卡 DEMO 中的建筑、自然地形、怪物、特效、桥梁、船只与道具资产，用于说明可复用资产库与场景搭建基础。</p>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
