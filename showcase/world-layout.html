<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>开放世界场景地编研究｜李振东作品集</title>
    <link rel="stylesheet" href="./showcase.css" />
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <a class="brand" href="../">LZD PORTFOLIO</a>
        <a class="back" href="../#projects">返回精选项目</a>
      </header>
      <section class="hero">
        <div>
          <p class="kicker">World Layout</p>
          <h1>开放世界场景地编研究</h1>
        </div>
        <p class="intro">用于展示探索路线、视线引导、场景节奏、兴趣点投放和空间层次研究。</p>
      </section>
      <section class="media-grid">
        <article class="media-card">
          <div class="media-frame">
            <video src="./media/world-layout-01.mp4" controls playsinline preload="metadata"></video>
          </div>
          <div class="caption">
            <h2>开放世界场景临摹展示</h2>
            <p>展示开放世界环境中的地形组织、自然遮挡、远近景层次与探索氛围塑造。</p>
          </div>
        </article>

        <article class="media-card">
          <div class="media-frame">
            <video src="./media/world-layout-02.mp4" controls playsinline preload="metadata"></video>
          </div>
          <div class="caption">
            <h2>C4D 场景资产过程</h2>
            <p>展示场景资产制作与空间搭建过程，补充建模、材质与环境呈现能力。</p>
          </div>
        </article>

        <article class="media-card">
          <div class="media-frame"><img src="./media/world-layout-cliff-shot1.png" alt="悬崖分镜 shot1 C4D 地形资产搭建截图" /></div>
          <div class="caption">
            <h2>悬崖分镜shot1资产搭建</h2>
            <p>展示 C4D 中山体、悬崖地形与镜头视野范围的早期资产搭建过程，用于支撑开放世界远景与地形层次表达。</p>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
