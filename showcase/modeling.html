<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>硬表面道具建模练习｜李振东作品集</title>
    <link rel="stylesheet" href="./showcase.css" />
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <a class="brand" href="/">LZD PORTFOLIO</a>
        <a class="back" href="/#projects">返回精选项目</a>
      </header>
      <section class="hero">
        <div>
          <p class="kicker">3D Modeling</p>
          <h1>硬表面道具建模练习</h1>
        </div>
        <p class="intro">用于展示模型轮廓、材质分区、制作流程、渲染图和线框图。</p>
      </section>
      <section class="media-grid">
        <article class="media-card">
          <div class="media-frame"><img src="./media/modeling-pineapple-render.png" alt="菠萝屋场景建模成品渲染图" /></div>
          <div class="caption">
            <h2>菠萝屋场景成品渲染</h2>
            <p>展示卡通风格场景的主体造型、灯光氛围、材质层次与整体画面完成度。</p>
          </div>
        </article>

        <article class="media-card">
          <div class="media-frame"><img src="./media/modeling-school-color.png" alt="校园建筑场景建模彩色材质截图" /></div>
          <div class="caption">
            <h2>校园建筑场景建模</h2>
            <p>展示建筑体块、广场铺装、绿化节点与场景小件的组合，体现完整场景资产组织能力。</p>
          </div>
        </article>

        <article class="media-card">
          <div class="media-frame"><img src="./media/modeling-school-graybox.png" alt="校园建筑场景灰模结构截图" /></div>
          <div class="caption">
            <h2>校园场景灰模结构</h2>
            <p>展示建筑、道路、景观与空间比例的灰模阶段，便于说明从体块搭建到材质完善的制作流程。</p>
          </div>
        </article>

      </section>
      <p class="note">本页用于展示建模作品从制作过程到最终渲染的完整呈现。</p>
    </main>
  </body>
</html>
